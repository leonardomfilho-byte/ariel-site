<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ariel Nutrição Animal</title>

<style>

body{
margin:0;
background:#0f0f0f;
font-family:Arial,sans-serif;
color:white;
}

header{
text-align:center;
padding:40px 20px;
background:black;
}

.logo{
width:160px;
display:block;
margin:auto;
}

.container{
max-width:520px;
margin:40px auto;
background:#1a1a1a;
padding:40px;
border-radius:10px;
box-shadow:0 0 30px rgba(255,204,0,0.15);
}

h2{
text-align:center;
margin-bottom:30px;
}

input,select{
width:100%;
padding:14px;
margin-bottom:15px;
border-radius:5px;
border:1px solid #333;
background:#111;
color:white;
font-size:15px;
}

button{
width:100%;
padding:15px;
background:#ffcc00;
border:none;
font-weight:bold;
font-size:16px;
cursor:pointer;
border-radius:5px;
}

button:hover{
background:#e6b800;
}

.whatsapp{
background:#25D366;
margin-top:20px;
}

</style>

</head>

<body>

<header>
<img src="logo-ariel.png" class="logo">
</header>

<div class="container">

<h2>Diagnóstico Estratégico para Seu Rebanho</h2>

<input type="text" id="nome" placeholder="Seu nome">
<input type="text" id="cidade" placeholder="Sua cidade">

<select id="tipo">
<option value="">Tipo de gado</option>
<option value="Corte">Corte</option>
<option value="Leite">Leite</option>
</select>

<input type="number" id="peso" placeholder="Peso médio do animal (kg)">

<select id="pasto">
<option value="">Condição do pasto</option>
<option value="Bom">Bom</option>
<option value="Regular">Regular</option>
<option value="Fraco">Fraco</option>
</select>

<select id="objetivo">
<option value="">Objetivo</option>
<option value="Engorda">Engorda</option>
<option value="Aumentar produção de leite">Aumentar produção de leite</option>
<option value="Recria">Recria</option>
</select>

<button onclick="gerarDiagnostico()">
GERAR DIAGNÓSTICO
</button>

<div id="resultado" style="display:none;margin-top:25px;"></div>

<button id="btnWhatsapp"
class="whatsapp"
style="display:none"
onclick="continuarConversa()">

Falar no WhatsApp

</button>

</div>

<script>

async function gerarDiagnostico(){

const nome = document.getElementById("nome").value;
const cidade = document.getElementById("cidade").value;
const tipo = document.getElementById("tipo").value;
const peso = document.getElementById("peso").value;
const pasto = document.getElementById("pasto").value;
const objetivo = document.getElementById("objetivo").value;

const resultadoDiv = document.getElementById("resultado");

if(!nome || !tipo || !peso || !pasto || !objetivo){
resultadoDiv.style.display = "block";
resultadoDiv.innerText = "Preencha todos os campos.";
return;
}

resultadoDiv.style.display = "block";
resultadoDiv.innerText = "Analisando dados do rebanho...";

// 🔥 SIMULAÇÃO INTELIGENTE (SUBSTITUI BACKEND)
let diagnostico = gerarRespostaIA(tipo, peso, pasto, objetivo);

resultadoDiv.style.textAlign = "justify";
resultadoDiv.innerText =
"Sr. " + nome + ",\n\n" +
diagnostico +
"\n\nSe fizer sentido pra sua operação, me chama no WhatsApp.";

document.getElementById("btnWhatsapp").style.display = "block";

window.dadosCliente = {
nome, cidade, tipo, peso, pasto, objetivo,
diagnostico
};

}

// 🧠 MOTOR SIMULADO (IA LOCAL)
function gerarRespostaIA(tipo, peso, pasto, objetivo){

let resposta = "";

if(pasto === "Fraco"){
resposta += "Seu pasto está limitando diretamente o desempenho do rebanho. ";
}

if(pasto === "Regular"){
resposta += "Seu sistema está em nível intermediário, com espaço claro para ganho de performance. ";
}

if(tipo === "Corte"){
resposta += "No gado de corte, o ganho de peso depende fortemente de ajuste nutricional estratégico. ";
}

if(tipo === "Leite"){
resposta += "Na produção de leite, pequenas correções nutricionais geram aumento direto na produtividade. ";
}

if(objetivo === "Engorda"){
resposta += "Para engorda, é possível acelerar ganho diário com suplementação correta. ";
}

if(objetivo === "Aumentar produção de leite"){
resposta += "Existe potencial de aumento de produção com ajuste fino de dieta. ";
}

if(peso < 300){
resposta += "Seu rebanho está abaixo do peso ideal, indicando deficiência nutricional. ";
}

if(peso > 500){
resposta += "Seu rebanho já tem bom porte, mas pode melhorar eficiência alimentar. ";
}

resposta += "O ajuste técnico correto pode destravar resultado imediato na sua operação.";

return resposta;
}

// 📲 WHATSAPP

function continuarConversa(){

const d = window.dadosCliente;

const mensagem = encodeURIComponent(
"Chegou um diagnóstico do site:\n\n" +
"Cliente: " + d.nome + "\n" +
"Cidade: " + d.cidade + "\n" +
"Tipo: " + d.tipo + "\n" +
"Peso: " + d.peso + " kg\n" +
"Pasto: " + d.pasto + "\n" +
"Objetivo: " + d.objetivo + "\n\n" +
"Diagnóstico:\n" + d.diagnostico
);

const url = "https://wa.me/5594984142737?text=" + mensagem;

window.open(url,"_blank");

}

</script>

</body>
</html>
